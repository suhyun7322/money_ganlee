<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 재정 관리 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 다크모드 기반 커스텀 스타일 및 스크롤바 정돈 */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col justify-between">

    <div class="max-w-7xl mx-auto w-full space-y-6">
        <header class="flex justify-between items-center bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-emerald-400">📊 Finance Dashboard</h1>
                <p class="text-sm text-slate-400 mt-1">아이패드 최적화 개인 자산 관리 시스템</p>
            </div>
            <div class="text-right">
                <span class="text-xs bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full border border-slate-600">🌙 Dark Mode Active</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="space-y-6 lg:col-span-1">
                <section class="bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-700 space-y-4">
                    <h2 class="text-lg font-semibold text-slate-200">💰 자산 설정</h2>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">현재 잔액 (원)</label>
                        <input type="number" id="currentBalance" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-emerald-400 font-semibold focus:outline-none focus:border-emerald-500" value="0" onchange="updateCalculations()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">이번 달 기본 예산 (원)</label>
                        <input type="number" id="monthlyBudget" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-blue-400 font-semibold focus:outline-none focus:border-blue-500" value="1000000" onchange="updateCalculations()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">MMF 보유 금액 (원)</label>
                        <input type="number" id="mmfBalance" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-amber-400 font-semibold focus:outline-none focus:border-amber-500" value="0" onchange="updateCalculations()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">MMF 목표 금액 (원)</label>
                        <input type="number" id="mmfTarget" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-slate-300 focus:outline-none focus:border-amber-500" value="5000000" onchange="updateCalculations()">
                    </div>
                </section>

                <section class="bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-700 space-y-4">
                    <h2 class="text-lg font-semibold text-slate-200">💸 요약 및 추적</h2>
                    
                    <div class="p-3.5 bg-slate-900/50 rounded-xl border border-slate-700/60">
                        <p class="text-xs text-slate-400">남은 예상 금액 (잔액 - 예정지출)</p>
                        <p class="text-xl font-bold text-emerald-400 mt-1" id="estimatedResult">0 원</p>
                    </div>

                    <div class="p-3.5 bg-slate-900/50 rounded-xl border border-slate-700/60">
                        <p class="text-xs text-slate-400">이번 달 남은 예산 (예산 - 지출합계)</p>
                        <p class="text-xl font-bold text-blue-400 mt-1" id="budgetLeftResult">0 원</p>
                    </div>

                    <div class="p-3.5 bg-slate-900/50 rounded-xl border border-slate-700/60">
                        <div class="flex justify-between items-center">
                            <p class="text-xs text-slate-400">☕ 간식/카페 지출 현황</p>
                            <span class="text-xs text-rose-400 font-medium" id="cafeRatio">0%</span>
                        </div>
                        <p class="text-base font-semibold text-slate-200 mt-1" id="cafeTotal">0 원 / 100,000 원</p>
                    </div>

                    <div class="space-y-1.5 pt-2">
                        <div class="flex justify-between text-xs">
                            <span class="text-slate-400">🎯 MMF 달성률</span>
                            <span class="text-amber-400 font-bold" id="mmfPercent">0%</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-3.5 border border-slate-700 overflow-hidden">
                            <div id="mmfProgressBar" class="bg-gradient-to-r from-amber-500 to-yellow-400 h-3.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="space-y-6 lg:col-span-2 flex flex-col justify-between">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <section class="bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-700 space-y-4 flex flex-col justify-between">
                        <h2 class="text-lg font-semibold text-slate-200">📝 지출 기록 추가</h2>
                        <form id="expenseForm" onsubmit="addExpense(event)" class="space-y-3">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">내역명</label>
                                <input type="text" id="expTitle" required class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-sm focus:outline-none focus:border-emerald-500">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">금액</label>
                                    <input type="number" id="expAmount" required class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-sm focus:outline-none focus:border-emerald-500">
                                </div>
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">카테고리</label>
                                    <select id="expCategory" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-sm focus:outline-none focus:border-emerald-500 text-slate-300">
                                        <option value="식비">🍔 식비</option>
                                        <option value="카페/간식">☕ 카페/간식</option>
                                        <option value="교통">🚌 교통</option>
                                        <option value="쇼핑">🛍️ 쇼핑</option>
                                        <option value="기타">✨ 기타</option>
                                    </select>
                                </div>
                            </div>
                            <div class="flex items-center pt-2">
                                <input type="checkbox" id="expIsExpected" class="w-4 h-4 text-emerald-600 bg-slate-900 border-slate-700 rounded focus:ring-emerald-500">
                                <label for="expIsExpected" class="ml-2 text-xs text-slate-300 select-none cursor-pointer">이 지출은 **예정된 지출**입니다.</label>
                            </div>
                            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium p-2.5 rounded-xl transition mt-2 shadow-lg">기록 추가</button>
                        </form>
                    </section>

                    <section class="bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-700 flex flex-col justify-between">
                        <h2 class="text-lg font-semibold text-slate-200 mb-2">📊 카테고리별 통계</h2>
                        <div class="relative w-full h-44 flex items-center justify-center">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </section>
                </div>

                <section class="bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-700 flex-1">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-semibold text-slate-200">📋 지출 내역 리스트</h2>
                        <button onclick="clearAllExpenses()" class="text-xs text-rose-400 hover:underline">전체 삭제</button>
                    </div>
                    <div class="overflow-y-auto max-h-80 space-y-2 pr-1" id="expenseList">
                        <p class="text-center text-sm text-slate-500 py-8">등록된 지출 내역이 없습니다.</p>
                    </div>
                </section>
            </div>

        </div>
    </div>

    <footer class="text-center text-xs text-slate-600 mt-10">
        &copy; 2026 Private Finance Workspace. LocalStorage 기반 시스템.
    </footer>

    <script>
        // 대시보드 상태 관리 객체
        let state = {
            currentBalance: 0,
            monthlyBudget: 1000000,
            mmfBalance: 0,
            mmfTarget: 5000000,
            expenses: []
        };

        let chartInstance = null;

        // 초기화 데이터 로드
        window.onload = function() {
            loadFromLocalStorage();
            initChart();
            updateCalculations();
        };

        // 데이터 저장 및 불러오기
        function saveToLocalStorage() {
            localStorage.setItem('finance_state', JSON.stringify(state));
        }

        function loadFromLocalStorage() {
            const data = localStorage.getItem('finance_state');
            if (data) {
                state = JSON.parse(data);
                // 인풋 값 매핑
                document.getElementById('currentBalance').value = state.currentBalance;
                document.getElementById('monthlyBudget').value = state.monthlyBudget;
                document.getElementById('mmfBalance').value = state.mmfBalance;
                document.getElementById('mmfTarget').value = state.mmfTarget;
            }
        }

        // 지출 내역 리스트 추가
        function addExpense(e) {
            e.preventDefault();
            const title = document.getElementById('expTitle').value;
            const amount = parseInt(document.getElementById('expAmount').value) || 0;
            const category = document.getElementById('expCategory').value;
            const isExpected = document.getElementById('expIsExpected').checked;

            const newExpense = {
                id: Date.now(),
                title,
                amount,
                category,
                isExpected
            };

            state.expenses.push(newExpense);
            saveToLocalStorage();
            updateCalculations();

            // 폼 초기화
            document.getElementById('expenseForm').reset();
        }

        // 특정 지출 내역 제거
        function deleteExpense(id) {
            state.expenses = state.expenses.filter(item => item.id !== id);
            saveToLocalStorage();
            updateCalculations();
        }

        // 전체 초기화
        function clearAllExpenses() {
            if(confirm("모든 지출 내역을 삭제하시겠습니까?")) {
                state.expenses = [];
                saveToLocalStorage();
                updateCalculations();
            }
        }

        // 종합 연산 및 UI 갱신 함수
        function updateCalculations() {
            // 인풋 값 실시간 동기화
            state.currentBalance = parseInt(document.getElementById('currentBalance').value) || 0;
            state.monthlyBudget = parseInt(document.getElementById('monthlyBudget').value) || 0;
            state.mmfBalance = parseInt(document.getElementById('mmfBalance').value) || 0;
            state.mmfTarget = parseInt(document.getElementById('mmfTarget').value) || 1; // 0 분모 방지
            saveToLocalStorage();

            // 1. 예정 지출 총액 및 전체 지출 총액 계산
            let totalExpected = 0;
            let totalSpent = 0;
            let cafeSpent = 0;

            state.expenses.forEach(item => {
                totalSpent += item.amount;
                if (item.isExpected) {
                    totalExpected += item.amount;
                }
                if (item.category === '카페/간식') {
                    cafeSpent += item.amount;
                }
            });

            // 2. 결과 값 산출
            const estimatedResult = state.currentBalance - totalExpected; // 남은 예상 금액
            const budgetLeftResult = state.monthlyBudget - totalSpent;     // 이번 달 남은 사용 가능 금액

            // 3. UI 렌더링
            document.getElementById('estimatedResult').innerText = estimatedResult.toLocaleString() + " 원";
            document.getElementById('budgetLeftResult').innerText = budgetLeftResult.toLocaleString() + " 원";
            
            // 카페/간식 트래킹 (한도 10만원 고정 가이드라인 예시)
            const cafeLimit = 100000;
            const cafeRatio = Math.min((cafeSpent / cafeLimit) * 100, 100).toFixed(0);
            document.getElementById('cafeTotal').innerText = `${cafeSpent.toLocaleString()} 원 / ${cafeLimit.toLocaleString()} 원`;
            document.getElementById('cafeRatio').innerText = `${cafeRatio}%`;

            // MMF 달성률 계산
            const mmfRatio = Math.min((state.mmfBalance / state.mmfTarget) * 100, 100).toFixed(1);
            document.getElementById('mmfPercent').innerText = `${mmfRatio}%`;
            document.getElementById('mmfProgressBar').style.width = `${mmfRatio}%`;

            // 리스트 다시 그리기
            renderExpenseList();
            
            // 차트 동기화 update
            updateChart(getCategoryTotals());
        }

        // 내역 리스트 UI 출력
        function renderExpenseList() {
            const listContainer = document.getElementById('expenseList');
            if(state.expenses.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-sm text-slate-500 py-8">등록된 지출 내역이 없습니다.</p>`;
                return;
            }

            listContainer.innerHTML = state.expenses.map(item => `
                <div class="flex justify-between items-center bg-slate-900 p-3 rounded-xl border border-slate-700/50 transition hover:border-slate-600">
                    <div class="flex items-center space-x-2.5">
                        <span class="text-xs px-2 py-1 rounded-md bg-slate-800 text-slate-300 border border-slate-700">${item.category}</span>
                        <div>
                            <p class="text-sm font-medium ${item.isExpected ? 'text-amber-300 font-semibold' : 'text-slate-200'}">
                                ${item.title} ${item.isExpected ? '<span class="text-[10px] bg-amber-500/20 text-amber-400 px-1 rounded">예정</span>' : ''}
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-sm font-bold text-slate-100">${item.amount.toLocaleString()}원</span>
                        <button onclick="deleteExpense(${item.id})" class="text-slate-500 hover:text-rose-400 text-xs p-1">✕</button>
                    </div>
                </div>
            `).join('');
        }

        // 카테고리별 합산 추출
        function getCategoryTotals() {
            const totals = { '식비': 0, '카페/간식': 0, '교통': 0, '쇼핑': 0, '기타': 0 };
            state.expenses.forEach(item => {
                if(totals[item.category] !== undefined) {
                    totals[item.category] += item.amount;
                }
            });
            return Object.values(totals);
        }

        // Chart.js 초기화 및 연동
        function initChart() {
            const ctx = document.getElementById('categoryChart').getContext('2document.getElementById');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['식비', '카페/간식', '교통', '쇼핑', '기타'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#94a3b8', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        function updateChart(dataArray) {
            if(chartInstance) {
                chartInstance.data.datasets[0].data = dataArray;
                chartInstance.update();
            }
        }
    </script>
</body>
</html>
