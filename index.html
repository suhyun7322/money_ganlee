<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 재정 관리 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #0f172a;    /* 슬레이트 차콜 */
            --accent: #3b82f6;     /* 사파이어 블루 */
            --bg-main: #f1f5f9;    /* 깨끗한 연그레이 배경 */
            --bg-card: #ffffff;    /* 순백색 카드 */
            --border: #e2e8f0;     /* 부드러운 테두리 */
        }

        body {
            background-color: var(--bg-main);
            color: var(--primary);
            font-family: 'Noto Sans KR', sans-serif;
            letter-spacing: -0.025em;
        }

        /* 세련된 카드 스타일 */
        .pro-card {
            background: var(--bg-card);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
            padding: 28px;
            transition: all 0.3s ease;
        }

        .pro-card:hover {
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.06);
        }

        /* 입력창 디자인 업그레이드 */
        input[type="number"], input[type="text"], select {
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            width: 100%;
            outline: none;
            background-color: #f8fafc;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        /* 프로그레스 바 트랙 트렌디하게 변경 */
        .progress-track {
            background-color: #f1f5f9;
            border-radius: 999px;
            height: 14px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-6 sm:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                    <i class="fa-solid fa-chart-pie text-blue-500"></i> 자산 관리 대시보드
                </h1>
                <p class="text-slate-400 text-sm mt-1 font-medium">나만의 프라이빗 통합 재정 분석 시스템</p>
            </div>
            <div class="text-right">
                <div class="flex items-center gap-2 text-blue-600 bg-blue-50 px-4 py-2 rounded-full font-bold text-xs">
                    <i class="fa-solid fa-shield-halved animate-pulse"></i>
                    <span>안전한 로컬 세션 활성화</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            
            <div class="col-span-12 lg:col-span-4 space-y-6">
                
                <div class="pro-card">
                    <h2 class="text-md font-bold mb-5 flex items-center gap-2 text-slate-800">
                        <i class="fa-solid fa-sliders text-blue-500"></i> 기본 자산 설정
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 block mb-1.5">현재 내 잔액 (원)</label>
                            <input type="number" id="currentBalance" value="0" onchange="sync()">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 block mb-1.5">한 달 총 예산 (원)</label>
                            <input type="number" id="monthlyBudget" value="1500000" onchange="sync()">
                        </div>
                        <div class="pt-4 border-t border-slate-100">
                            <label class="text-xs font-bold text-blue-600 block mb-1.5">MMF 현재 금액 (원)</label>
                            <input type="number" id="mmfBalance" value="0" onchange="sync()" class="!bg-blue-50/50 !border-blue-100">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 block mb-1.5">MMF 목표 금액 (원)</label>
                            <input type="number" id="mmfTarget" value="10000000" onchange="sync()">
                        </div>
                    </div>
                </div>

                <div class="pro-card">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">🎯 MMF 목표 달성률</h2>
                        <span id="mmfPercentText" class="text-2xl font-bold text-blue-500">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="mmfBar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div class="pro-card border-l-4 border-amber-500">
                    <h2 class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">☕ 카페 & 간식 누적 한도</h2>
                    <div class="flex items-baseline gap-1.5 mb-3">
                        <span id="cafeSpent" class="text-2xl font-bold text-slate-800">0</span>
                        <span class="text-xs text-slate-400 font-bold">/ 150,000 원</span>
                    </div>
                    <div class="progress-track h-2">
                        <div id="cafeBar" class="bg-gradient-to-r from-amber-400 to-orange-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8 space-y-6">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="pro-card bg-slate-800 border-none text-white shadow-xl relative overflow-hidden">
                        <div class="absolute right-4 bottom-2 opacity-10 text-7xl"><i class="fa-solid fa-calculator"></i></div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wide">남은 예상 금액 (잔액 - 예정지출)</p>
                        <p id="estimatedResult" class="text-3xl font-bold mt-2 text-emerald-400">0 원</p>
                    </div>
                    <div class="pro-card bg-gradient-to-br from-blue-600 to-indigo-700 border-none text-white shadow-xl relative overflow-hidden">
                        <div class="absolute right-4 bottom-2 opacity-10 text-7xl"><i class="fa-solid fa-credit-card"></i></div>
                        <p class="text-xs font-bold text-blue-200 uppercase tracking-wide">이번 달 남은 가용 예산</p>
                        <p id="budgetLeft" class="text-3xl font-bold mt-2 text-white">0 원</p>
                    </div>
                </div>

                <div class="pro-card">
                    <h2 class="text-md font-bold mb-5 text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-circle-plus text-blue-500"></i> 새로운 지출 내역 기록
                    </h2>
                    <form id="expenseForm" onsubmit="addExpense(event)" class="space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <label class="text-xs font-bold text-slate-500 mb-1.5 block">지출 내역명</label>
                                <input type="text" id="expTitle" placeholder="예: 스타벅스 아메리카노" required>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500 mb-1.5 block">금액 (원)</label>
                                <input type="number" id="expAmount" placeholder="숫자만 입력" required>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500 mb-1.5 block">카테고리 분류</label>
                                <select id="expCategory">
                                    <option value="식비">🍔 식비</option>
                                    <option value="카페/간식">☕ 카페/간식</option>
                                    <option value="교통">🚌 교통</option>
                                    <option value="쇼핑">🛍️ 쇼핑</option>
                                    <option value="기타">✨ 기타</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center gap-2.5 py-1">
                            <input type="checkbox" id="expIsExpected" class="w-4 h-4 accent-blue-600 cursor-pointer">
                            <label for="expIsExpected" class="text-xs font-bold text-slate-500 cursor-pointer select-none">
                                이 지출은 <span class="text-blue-600 font-bold">예정된 지출</span>입니다. (체크 시 남은 예상 금액에서 우선 차감)
                            </label>
                        </div>
                        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition shadow-md hover:shadow-lg">
                            거래 데이터 등록
                        </button>
                    </form>
                </div>

                <div class="pro-card">
                    <div class="flex justify-between items-center mb-5">
                        <h2 class="text-md font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-list-check text-slate-400"></i> 거래 명세 기록부
                        </h2>
                        <button onclick="clearAll()" class="text-xs font-bold text-rose-500 border border-rose-100 bg-rose-50/50 px-3 py-1.5 rounded-lg hover:bg-rose-50 transition">
                            전체 데이터 초기화
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-400 text-xs uppercase font-bold border-b border-slate-100">
                                    <th class="px-5 py-3 rounded-l-xl">분류</th>
                                    <th class="px-5 py-3">내역명</th>
                                    <th class="px-5 py-3 text-right">금액</th>
                                    <th class="px-5 py-3 text-center rounded-r-xl">작업</th>
                                </tr>
                            </thead>
                            <tbody id="ledgerBody" class="text-sm divide-y divide-slate-100">
                                </tbody>
                        </table>
                        <div id="emptyState" class="py-16 text-center text-slate-300 font-bold hidden">
                            <i class="fa-solid fa-folder-open text-4xl mb-3 block text-slate-200"></i>
                            현재 기록된 지출 내역이 없습니다.
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let state = {
            currentBalance: 0,
            monthlyBudget: 1500000,
            mmfBalance: 0,
            mmfTarget: 10000000,
            expenses: []
        };

        window.onload = () => {
            const savedData = localStorage.getItem('pro_finance_data');
            if (savedData) {
                state = JSON.parse(savedData);
                document.getElementById('currentBalance').value = state.currentBalance;
                document.getElementById('monthlyBudget').value = state.monthlyBudget;
                document.getElementById('mmfBalance').value = state.mmfBalance;
                document.getElementById('mmfTarget').value = state.mmfTarget;
            }
            sync();
        };

        function sync() {
            state.currentBalance = Number(document.getElementById('currentBalance').value) || 0;
            state.monthlyBudget = Number(document.getElementById('monthlyBudget').value) || 0;
            state.mmfBalance = Number(document.getElementById('mmfBalance').value) || 0;
            state.mmfTarget = Number(document.getElementById('mmfTarget').value) || 1;

            localStorage.setItem('pro_finance_data', JSON.stringify(state));

            let totalSpent = 0;
            let expectedSpent = 0;
            let cafeTotal = 0;

            state.expenses.forEach(e => {
                totalSpent += e.amount;
                if (e.isExpected) expectedSpent += e.amount;
                if (e.category === '카페/간식') cafeTotal += e.amount;
            });

            document.getElementById('estimatedResult').innerText = (state.currentBalance - expectedSpent).toLocaleString() + " 원";
            document.getElementById('budgetLeft').innerText = (state.monthlyBudget - totalSpent).toLocaleString() + " 원";
            
            const mmfRatio = Math.min((state.mmfBalance / state.mmfTarget) * 100, 100);
            document.getElementById('mmfBar').style.width = mmfRatio + "%";
            document.getElementById('mmfPercentText').innerText = mmfRatio.toFixed(1) + "%";

            const cafeLimit = 150000;
            document.getElementById('cafeSpent').innerText = cafeTotal.toLocaleString();
            document.getElementById('cafeBar').style.width = Math.min((cafeTotal / cafeLimit) * 100, 100) + "%";

            renderLedger();
        }

        function addExpense(e) {
            e.preventDefault();
            
            const newExp = {
                id: Date.now(),
                title: document.getElementById('expTitle').value.trim(),
                amount: Number(document.getElementById('expAmount').value) || 0,
                category: document.getElementById('expCategory').value,
                isExpected: document.getElementById('expIsExpected').checked
            };

            state.expenses.push(newExp);
            document.getElementById('expenseForm').reset();
            sync();
        }

        function deleteExp(id) {
            state.expenses = state.expenses.filter(e => e.id !== id);
            sync();
        }

        function clearAll() {
            if (confirm("정말로 모든 지출 내역 데이터를 완전히 초기화하시겠습니까?")) {
                state.expenses = [];
                sync();
            }
        }

        function renderLedger() {
            const body = document.getElementById('ledgerBody');
            const empty = document.getElementById('emptyState');
            
            if (state.expenses.length === 0) {
                body.innerHTML = "";
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            body.innerHTML = state.expenses.slice().reverse().map(e => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-5 py-4">
                        <span class="px-2.5 py-1 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg">${e.category}</span>
                    </td>
                    <td class="px-5 py-4 font-semibold text-slate-700">
                        ${e.title}
                        ${e.isExpected ? '<span class="ml-2 text-[10px] text-blue-600 border border-blue-200 px-1.5 py-0.5 rounded-md font-bold bg-blue-50">예정</span>' : ''}
                    </td>
                    <td class="px-5 py-4 text-right font-bold text-slate-900">
                        ${e.amount.toLocaleString()} 원
                    </td>
                    <td class="px-5 py-4 text-center">
                        <button onclick="deleteExp(${e.id})" class="text-slate-300 hover:text-rose-500 transition p-1">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
